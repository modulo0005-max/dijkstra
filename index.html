<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수학교과캠프 프로젝트 모음</title>
    <!-- 세련된 기본 폰트를 불러옵니다 -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v3.2.1/dist/web/static/pretendard.css" />
    <style>
        /* 다크모드 및 유리 질감(Glassmorphism) 테마를 위한 색상 설정 */
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.1);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%); /* 어두운 남색 계열의 배경 그라데이션 */
            color: var(--text-primary);
            margin: 0;
            padding: 50px 20px;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .header {
            text-align: center;
            margin-bottom: 60px;
        }

        .header h1 {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 15px;
            /* 제목에 빛나는 색상 입히기 */
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            font-size: 1.2rem;
            color: var(--text-secondary);
        }

        /* 버튼들을 바둑판식으로 배치하는 설정 */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
            max-width: 1100px;
            margin: 0 auto;
        }

        /* 각 프로젝트로 이동하는 카드 모양 버튼 디자인 */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 40px 30px;
            text-decoration: none;
            color: var(--text-primary);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px); /* 배경을 투명하게 비치게 함 */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        /* 마우스를 올렸을 때의 애니메이션 효과 */
        .card:hover {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4); /* 그림자가 짙어짐 */
        }

        .card-icon {
            font-size: 3.5rem;
            margin-bottom: 20px;
        }

        .card-title {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .card-desc {
            font-size: 1rem;
            color: var(--text-secondary);
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>수학교과캠프 프로젝트 모음</h1>
        <p>선생님과 학생들이 만든 다양한 알고리즘과 수학 프로젝트를 확인해 보세요.</p>
    </div>

    <div class="grid">
        <!-- 1. 메인 프로젝트 -->
        <a href="escape_game.html" class="card">
            <div class="card-icon">🗺️</div>
            <div class="card-title">최단 경로로 탈출하라</div>
            <div class="card-desc">메인 프로젝트</div>
        </a>

        <!-- 2. 학생 프로젝트들 -->
        <a href="uploads/골든타임(최종).html" class="card">
            <div class="card-icon">🚑</div>
            <div class="card-title">골든타임</div>
            <div class="card-desc">학생 프로젝트</div>
        </a>
        <a href="uploads/급식실(최종).html" class="card">
            <div class="card-icon">🍱</div>
            <div class="card-title">급식실</div>
            <div class="card-desc">학생 프로젝트</div>
        </a>
        <a href="uploads/다익스트라 알고리즘 튜토리얼.html" class="card">
            <div class="card-icon">📚</div>
            <div class="card-title">다익스트라 튜토리얼</div>
            <div class="card-desc">학생 프로젝트</div>
        </a>
        <a href="uploads/도서관 탈출(최종).html" class="card">
            <div class="card-icon">📖</div>
            <div class="card-title">도서관 탈출</div>
            <div class="card-desc">학생 프로젝트</div>
        </a>
        <a href="uploads/심화주제탐구.html" class="card">
            <div class="card-icon">🔬</div>
            <div class="card-title">심화주제탐구</div>
            <div class="card-desc">학생 프로젝트</div>
        </a>
        <a href="uploads/최저탄소경로찾기.html" class="card">
            <div class="card-icon">🌱</div>
            <div class="card-title">최저탄소 경로찾기</div>
            <div class="card-desc">학생 프로젝트</div>
        </a>
        <a href="uploads/화이트 해커(최종).html" class="card">
            <div class="card-icon">💻</div>
            <div class="card-title">화이트 해커</div>
            <div class="card-desc">학생 프로젝트</div>
        </a>
    </div>
</body>
</html>
